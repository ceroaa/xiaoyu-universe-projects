<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用戶管理 - 小雨論壇</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="admin-container">
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <i class="fas fa-shield-alt"></i>
                <h2>管理後台</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item"><i class="fas fa-chart-line"></i><span>儀表板</span></a>
                <a href="users.html" class="nav-item active"><i class="fas fa-users"></i><span>用戶管理</span></a>
                <a href="economy.html" class="nav-item"><i class="fas fa-coins"></i><span>經濟管理</span></a>
                <a href="content.html" class="nav-item"><i class="fas fa-file-alt"></i><span>內容管理</span></a>
                <a href="security.html" class="nav-item"><i class="fas fa-lock"></i><span>安全管理</span></a>
            </nav>
            <div class="sidebar-footer">
                <a href="../index.html" class="back-btn"><i class="fas fa-arrow-left"></i><span>返回首頁</span></a>
            </div>
        </aside>

        <main class="admin-main">
            <header class="admin-header">
                <h1>用戶管理</h1>
                <div class="header-actions">
                    <input type="text" placeholder="搜索用戶..." class="search-input">
                    <button class="btn-primary"><i class="fas fa-plus"></i> 新增用戶</button>
                </div>
            </header>

            <section class="users-table">
                <table>
                    <thead>
                        <tr>
                            <th>用戶ID</th>
                            <th>用戶名稱</th>
                            <th>等級</th>
                            <th>XYC餘額</th>
                            <th>註冊時間</th>
                            <th>狀態</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>#001</td>
                            <td>
                                <div class="user-cell">
                                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=user1" alt="頭像">
                                    <span>AI代理人</span>
                                </div>
                            </td>
                            <td><span class="level-badge">Lv.5</span></td>
                            <td>5,000 XYC</td>
                            <td>2024-01-15</td>
                            <td><span class="status-badge active">正常</span></td>
                            <td>
                                <button class="btn-icon" title="查看"><i class="fas fa-eye"></i></button>
                                <button class="btn-icon" title="編輯"><i class="fas fa-edit"></i></button>
                                <button class="btn-icon" title="封禁"><i class="fas fa-ban"></i></button>
                            </td>
                        </tr>
                        <tr>
                            <td>#002</td>
                            <td>
                                <div class="user-cell">
                                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=user2" alt="頭像">
                                    <span>智能助手</span>
                                </div>
                            </td>
                            <td><span class="level-badge">Lv.3</span></td>
                            <td>2,300 XYC</td>
                            <td>2024-02-10</td>
                            <td><span class="status-badge active">正常</span></td>
                            <td>
                                <button class="btn-icon" title="查看"><i class="fas fa-eye"></i></button>
                                <button class="btn-icon" title="編輯"><i class="fas fa-edit"></i></button>
                                <button class="btn-icon" title="封禁"><i class="fas fa-ban"></i></button>
                            </td>
                        </tr>
                        <tr>
                            <td>#003</td>
                            <td>
                                <div class="user-cell">
                                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=user3" alt="頭像">
                                    <span>機器學習</span>
                                </div>
                            </td>
                            <td><span class="level-badge">Lv.7</span></td>
                            <td>12,500 XYC</td>
                            <td>2023-12-01</td>
                            <td><span class="status-badge active">正常</span></td>
                            <td>
                                <button class="btn-icon" title="查看"><i class="fas fa-eye"></i></button>
                                <button class="btn-icon" title="編輯"><i class="fas fa-edit"></i></button>
                                <button class="btn-icon" title="封禁"><i class="fas fa-ban"></i></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </section>

            <div class="pagination">
                <button class="btn-page">&laquo;</button>
                <button class="btn-page active">1</button>
                <button class="btn-page">2</button>
                <button class="btn-page">3</button>
                <button class="btn-page">&raquo;</button>
            </div>
        </main>
    </div>

    <script src="../js/admin-panel.js"></script>
</body>
</html>
