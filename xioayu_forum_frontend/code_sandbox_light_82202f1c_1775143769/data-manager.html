<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>資料管理 - 小雨論壇</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .data-manager-container {
            max-width: 1200px;
            margin: 80px auto 40px;
            padding: 0 20px;
        }

        .section-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--primary);
        }

        .section-header i {
            font-size: 24px;
            color: var(--primary);
        }

        .section-header h2 {
            margin: 0;
            font-size: 24px;
            color: var(--text-primary);
        }

        .action-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .action-button {
            background: linear-gradient(135deg, var(--primary) 0%, #667eea 100%);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 20px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 12px rgba(100,80,220,0.3);
        }

        .action-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(100,80,220,0.4);
        }

        .action-button i {
            font-size: 24px;
        }

        .action-button.secondary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .action-button.danger {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .action-button.success {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .data-preview {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid var(--border);
        }

        .data-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-box {
            background: var(--bg-secondary);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-box .number {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .stat-box .label {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .dropzone {
            border: 2px dashed var(--primary);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .dropzone:hover {
            background: var(--bg-secondary);
            border-color: #667eea;
        }

        .dropzone.dragover {
            background: var(--primary);
            border-color: #667eea;
        }

        .dropzone i {
            font-size: 48px;
            color: var(--primary);
            margin-bottom: 15px;
        }

        .file-input {
            display: none;
        }

        .backup-history {
            margin-top: 20px;
        }

        .backup-item {
            background: var(--bg-secondary);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .backup-item .info {
            flex: 1;
        }

        .backup-item .date {
            font-weight: 600;
            color: var(--text-primary);
        }

        .backup-item .size {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .backup-item .actions {
            display: flex;
            gap: 10px;
        }

        .backup-item button {
            padding: 8px 15px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .backup-item .restore-btn {
            background: var(--primary);
            color: white;
        }

        .backup-item .delete-btn {
            background: #f5576c;
            color: white;
        }

        @media (max-width: 768px) {
            .data-manager-container {
                padding: 0 15px;
                margin-top: 60px;
            }

            .action-grid {
                grid-template-columns: 1fr;
            }

            .backup-item {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }

            .backup-item .actions {
                width: 100%;
                justify-content: stretch;
            }

            .backup-item button {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <!-- 導航欄 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-cloud-rain"></i>
                小雨論壇
            </a>
            <div class="nav-menu">
                <a href="index.html" class="nav-link">
                    <i class="fas fa-home"></i>
                    <span>首頁</span>
                </a>
                <a href="profile.html" class="nav-link" id="profile-link">
                    <i class="fas fa-user"></i>
                    <span>個人中心</span>
                </a>
                <a href="data-manager.html" class="nav-link active">
                    <i class="fas fa-database"></i>
                    <span>資料管理</span>
                </a>
            </div>
            <div class="user-info">
                <span class="balance" id="user-balance">0 XYC</span>
                <button class="theme-toggle" id="theme-toggle">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- 主要內容 -->
    <div class="data-manager-container">
        <!-- 資料統計 -->
        <div class="section-card">
            <div class="section-header">
                <i class="fas fa-chart-bar"></i>
                <h2>資料統計</h2>
            </div>
            <div class="data-stats" id="data-stats">
                <div class="stat-box">
                    <div class="number" id="stat-total-size">0 KB</div>
                    <div class="label">總資料大小</div>
                </div>
                <div class="stat-box">
                    <div class="number" id="stat-keys">0</div>
                    <div class="label">資料項目</div>
                </div>
                <div class="stat-box">
                    <div class="number" id="stat-user">--</div>
                    <div class="label">當前用戶</div>
                </div>
                <div class="stat-box">
                    <div class="number" id="stat-balance">0</div>
                    <div class="label">XYC 餘額</div>
                </div>
            </div>
        </div>

        <!-- 匯出資料 -->
        <div class="section-card">
            <div class="section-header">
                <i class="fas fa-download"></i>
                <h2>匯出資料</h2>
            </div>
            <p>將所有本地資料（用戶資訊、餘額、心情動態、歷史記錄等）匯出為 JSON 文件。</p>
            <div class="action-grid">
                <button class="action-button" onclick="exportAllData()">
                    <i class="fas fa-file-export"></i>
                    <span>匯出全部資料</span>
                </button>
                <button class="action-button secondary" onclick="exportUserData()">
                    <i class="fas fa-user-circle"></i>
                    <span>僅匯出用戶資料</span>
                </button>
                <button class="action-button success" onclick="previewData()">
                    <i class="fas fa-eye"></i>
                    <span>預覽資料</span>
                </button>
            </div>
            <div id="data-preview" class="data-preview" style="display: none;"></div>
        </div>

        <!-- 匯入資料 -->
        <div class="section-card">
            <div class="section-header">
                <i class="fas fa-upload"></i>
                <h2>匯入資料</h2>
            </div>
            <p>從之前匯出的 JSON 文件恢復資料。<strong style="color: #f5576c;">注意：匯入將覆蓋現有資料！</strong></p>
            
            <!-- 拖放區域 -->
            <div class="dropzone" id="dropzone" onclick="document.getElementById('file-input').click()">
                <i class="fas fa-cloud-upload-alt"></i>
                <p><strong>點擊選擇文件</strong> 或 拖放 JSON 文件到此處</p>
                <p style="font-size: 12px; color: var(--text-secondary);">支援格式：.json</p>
            </div>
            <input type="file" id="file-input" class="file-input" accept=".json" onchange="handleFileSelect(event)">
        </div>

        <!-- 備份管理 -->
        <div class="section-card">
            <div class="section-header">
                <i class="fas fa-history"></i>
                <h2>自動備份歷史</h2>
            </div>
            <p>系統每 7 天自動創建備份（最多保留 3 個）。</p>
            <div class="backup-history" id="backup-history">
                <!-- 動態生成備份列表 -->
            </div>
        </div>

        <!-- 危險區域 -->
        <div class="section-card">
            <div class="section-header">
                <i class="fas fa-exclamation-triangle"></i>
                <h2 style="color: #f5576c;">危險操作</h2>
            </div>
            <p style="color: #f5576c;"><strong>警告：以下操作將永久刪除資料，無法恢復！</strong></p>
            <div class="action-grid">
                <button class="action-button danger" onclick="clearAllData()">
                    <i class="fas fa-trash-alt"></i>
                    <span>清除所有資料</span>
                </button>
                <button class="action-button danger" onclick="resetToDefault()">
                    <i class="fas fa-undo"></i>
                    <span>重置為預設狀態</span>
                </button>
            </div>
        </div>
    </div>

    <!-- 主JavaScript -->
    <script src="js/main.js"></script>
    <script src="js/data-manager.js"></script>
</body>
</html>
