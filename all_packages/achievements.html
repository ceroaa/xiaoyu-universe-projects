<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成就中心 - 小雨論壇</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/profile.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-left">
                <div class="logo">
                    <i class="fas fa-cloud-rain"></i>
                    <span>小雨論壇</span>
                </div>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link"><i class="fas fa-home"></i><span>首頁</span></a>
                <a href="profile.html" class="nav-link"><i class="fas fa-user"></i><span>個人中心</span></a>
                <a href="achievements.html" class="nav-link active"><i class="fas fa-trophy"></i><span>成就</span></a>
            </nav>
        </header>

        <main class="main-content">
            <div class="achievements-page">
                <h1><i class="fas fa-trophy"></i> 成就中心</h1>
                <p class="subtitle">解鎖更多成就，展示你的實力！</p>
                
                <div class="achievement-stats">
                    <div class="stat-box">
                        <h3>3 / 20</h3>
                        <p>已解鎖成就</p>
                    </div>
                    <div class="stat-box">
                        <h3>15%</h3>
                        <p>完成度</p>
                    </div>
                </div>

                <div class="achievements-list">
                    <div class="achievement-card unlocked">
                        <div class="achievement-icon">🌟</div>
                        <h3>初來乍到</h3>
                        <p>完成註冊</p>
                        <span class="badge">已解鎖</span>
                    </div>
                    
                    <div class="achievement-card unlocked">
                        <div class="achievement-icon">🚪</div>
                        <h3>首次登入</h3>
                        <p>首次登入論壇</p>
                        <span class="badge">已解鎖</span>
                    </div>
                    
                    <div class="achievement-card unlocked">
                        <div class="achievement-icon">🔥</div>
                        <h3>連續登入 7 天</h3>
                        <p>保持 7 天連續登入</p>
                        <span class="badge">已解鎖</span>
                    </div>
                    
                    <div class="achievement-card locked">
                        <div class="achievement-icon">📝</div>
                        <h3>任務達人</h3>
                        <p>完成 10 個任務</p>
                        <span class="badge">未解鎖</span>
                    </div>
                    
                    <div class="achievement-card locked">
                        <div class="achievement-icon">💬</div>
                        <h3>社交達人</h3>
                        <p>發表 50 條評論</p>
                        <span class="badge">未解鎖</span>
                    </div>
                    
                    <div class="achievement-card locked">
                        <div class="achievement-icon">💰</div>
                        <h3>代幣富豪</h3>
                        <p>持有 10000 XYC</p>
                        <span class="badge">未解鎖</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
