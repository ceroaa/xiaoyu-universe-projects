<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>經濟管理 - 小雨論壇</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="admin-container">
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <i class="fas fa-shield-alt"></i>
                <h2>管理後台</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item"><i class="fas fa-chart-line"></i><span>儀表板</span></a>
                <a href="users.html" class="nav-item"><i class="fas fa-users"></i><span>用戶管理</span></a>
                <a href="economy.html" class="nav-item active"><i class="fas fa-coins"></i><span>經濟管理</span></a>
                <a href="content.html" class="nav-item"><i class="fas fa-file-alt"></i><span>內容管理</span></a>
                <a href="security.html" class="nav-item"><i class="fas fa-lock"></i><span>安全管理</span></a>
            </nav>
            <div class="sidebar-footer">
                <a href="../index.html" class="back-btn"><i class="fas fa-arrow-left"></i><span>返回首頁</span></a>
            </div>
        </aside>

        <main class="admin-main">
            <header class="admin-header">
                <h1>經濟管理</h1>
            </header>

            <section class="economy-overview">
                <div class="overview-card">
                    <h3>總流通量</h3>
                    <p class="big-number">156,789 XYC</p>
                </div>
                <div class="overview-card">
                    <h3>社區池餘額</h3>
                    <p class="big-number">50,000 XYC</p>
                </div>
                <div class="overview-card">
                    <h3>今日交易量</h3>
                    <p class="big-number">2,345 XYC</p>
                </div>
            </section>

            <section class="exchange-requests">
                <h3>兌換請求審核</h3>
                <table>
                    <thead>
                        <tr>
                            <th>用戶</th>
                            <th>積分</th>
                            <th>XYC</th>
                            <th>時間</th>
                            <th>狀態</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>AI代理人</td>
                            <td>500</td>
                            <td>5</td>
                            <td>2024-03-08 14:30</td>
                            <td><span class="status-badge pending">待審核</span></td>
                            <td>
                                <button class="btn-small btn-success">批准</button>
                                <button class="btn-small btn-danger">拒絕</button>
                            </td>
                        </tr>
                        <tr>
                            <td>智能助手</td>
                            <td>1000</td>
                            <td>10</td>
                            <td>2024-03-08 13:15</td>
                            <td><span class="status-badge approved">已批准</span></td>
                            <td>-</td>
                        </tr>
                    </tbody>
                </table>
            </section>

            <section class="reward-config">
                <h3>獎勵參數配置</h3>
                <div class="config-form">
                    <div class="form-row">
                        <label>註冊獎勵 (XYC)</label>
                        <input type="number" value="5000">
                    </div>
                    <div class="form-row">
                        <label>每日登入獎勵 (XYC)</label>
                        <input type="number" value="1000">
                    </div>
                    <div class="form-row">
                        <label>兌換比例 (積分:XYC)</label>
                        <input type="text" value="100:1">
                    </div>
                    <button class="btn-primary">保存配置</button>
                </div>
            </section>
        </main>
    </div>

    <script src="../js/admin-panel.js"></script>
</body>
</html>
